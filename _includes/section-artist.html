<style>
    .instragram-media instagram-media-rendered {
        width: 100%;
        padding-left: 10px;
        padding-right: 10px;
    } 
    .juicer-feed.modern li.feed-item {
        border-radius: 16px;
        overflow: hidden;
    }
    .juicer-feed.modern .j-image img {
        /* padding: 15px;  */
        display: block;
        width: 100%;
    }
    /* Hide unwanted elements (scoped + high specificity so Juicer 2 / Tailwind utilities do not win) */
    #art-feed .juicer-feed .juicer-ad,
    #art-feed .juicer-feed h1.referral,
    #art-feed .juicer-feed .j-paginate,
    #art-feed .juicer-feed .j-meta-item.j-likes,
    #art-feed .juicer-feed .j-meta-item.j-comments,
    #art-feed .juicer-feed .j-logo,
    #art-feed .juicer-feed .j-powered-by {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        min-height: 0 !important;
        max-height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
        pointer-events: none !important;
    }
</style>

<section class="section art feed" id="art-feed">
    <div class="instagram-feed">  
        <script type="text/javascript" src="https://www.juicer.io/embed/ljm-art/embed-code.js" async defer></script>
    </div>
</section>

<script>
    function removeUnwantedElements() {
        var root = document.querySelector('#art-feed');
        if (!root) return;

        var unwantedClasses = [
            'feed-item juicer image-post juicer-about',
            'juicer-ad',
            'j-logo',
            'j-powered-by',
            'referral'
        ];

        unwantedClasses.forEach(function(className) {
            var sel = '.' + className.trim().replace(/\s+/g, '.');
            root.querySelectorAll(sel).forEach(function(element) {
                element.remove();
            });
        });

        root.querySelectorAll('.feed-item').forEach(function(item) {
            if (item.classList.contains('juicer-about') ||
                item.classList.contains('juicer-ad') ||
                item.classList.contains('j-logo') ||
                item.classList.contains('j-powered-by')) {
                item.remove();
            }
        });

        /* Fallback: promo tiles if class names change (grid cells only, cheap scan) */
        root.querySelectorAll('.juicer-feed [class*="htmx-grid"] > div').forEach(function(cell) {
            if ((cell.textContent || '').indexOf('Aggregate your social feeds') !== -1) {
                cell.remove();
            }
        });
    }

    function modifyJuicerFeed() {
        removeUnwantedElements();
        // Add any other modifications here
    }

    function checkJuicerFeed() {
        if (document.querySelector('.juicer-feed')) {
            modifyJuicerFeed();
        } else {
            setTimeout(checkJuicerFeed, 100);
        }
    }

    // Start checking for the Juicer feed
    checkJuicerFeed();

    // Re-run when Juicer / HTMX swaps feed HTML (otherwise ads return after settle)
    function attachFeedObservers() {
        var feedContainer = document.querySelector('#art-feed .instagram-feed');
        if (!feedContainer) return;

        var observer = new MutationObserver(function(mutations) {
            for (var i = 0; i < mutations.length; i++) {
                if (mutations[i].type === 'childList') {
                    modifyJuicerFeed();
                    break;
                }
            }
        });
        observer.observe(feedContainer, { childList: true, subtree: true });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', attachFeedObservers);
    } else {
        attachFeedObservers();
    }

    document.addEventListener('htmx:afterSwap', modifyJuicerFeed);
    document.addEventListener('htmx:afterSettle', modifyJuicerFeed);

    setInterval(removeUnwantedElements, 1000);
</script>
