# Author Settings

author:
  name: Liam McKane
  title: Hello, I’m Liam McKane
  bio: >
   I’m a Quality Engineer II at Alarm.com with a B.S. in Computer Engineering from George Mason University 
   and currently pursuing a M.S. in Computer Science at Johns Hopkins University. My work focuses on 
   embedded systems and intelligent devices, exploring how machine learning and software interact with real-world hardware.
   This site showcases my projects in machine learning, robotics, and embedded systems, along with a collection
   of my visual design and illustration work.
  image: '/images/Liam4.png'
  avatar: '/images/Liam4.png'
  button__text: See my projects

